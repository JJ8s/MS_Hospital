# 1. Identificación del Microservicio
spring.application.name=ms-inventario
server.port=8088

# 2. Conexión a la Base de Datos 
spring.datasource.url=jdbc:mysql://localhost:3306/db_hospital_inventario?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. Inicialización de Datos (Sincronización con schema.sql)
spring.sql.init.mode=always

spring.jpa.hibernate.ddl-auto=none

# 4. Configuración de JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 5. Conexión con el Eureka Server
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
