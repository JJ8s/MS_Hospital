spring.application.name=ms-urgencias
server.port=8086

# Base de Datos (Se creará automáticamente en XAMPP/MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/db_urgencias?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update

# Registro en Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Swagger / SpringDoc
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Evita que springdoc escanee los @RestControllerAdvice para generar respuestas
# genericas de error. En Spring Boot 3.5.x (Spring Framework 6.2+) ese escaneo
# instancia ControllerAdviceBean con un constructor que el framework ya elimino,
# lo cual rompe /v3/api-docs con NoSuchMethodError.
springdoc.override-with-generic-response=false